        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"borderWidth": 0, "color": "#a7f3d0", "font": {"color": "#334155", "size": 12}, "id": "input", "label": "input\nN\u00d73\u00d7H\u00d7W", "shape": "box"}, {"borderWidth": 0, "color": "#c7d2fe", "font": {"bold": true, "color": "#334155", "size": 14}, "id": "MaxPool_0", "label": "MaxPool", "shape": "box"}, {"borderWidth": 0, "color": "#c7d2fe", "font": {"bold": true, "color": "#334155", "size": 14}, "id": "Neg_1", "label": "Neg", "shape": "box"}, {"borderWidth": 0, "color": "#c7d2fe", "font": {"bold": true, "color": "#334155", "size": 14}, "id": "MaxPool_2", "label": "MaxPool", "shape": "box"}, {"borderWidth": 0, "color": "#c7d2fe", "font": {"bold": true, "color": "#334155", "size": 14}, "id": "Neg_3", "label": "Neg", "shape": "box"}, {"borderWidth": 0, "color": "#fed7aa", "font": {"color": "#334155", "size": 12}, "id": "output", "label": "output\nN\u00d73\u00d7H\u00d7W", "shape": "box"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "input", "title": "input", "to": "MaxPool_0"}, {"arrows": "to", "from": "MaxPool_0", "title": "dilated", "to": "Neg_1"}, {"arrows": "to", "from": "Neg_1", "title": "neg_dilated", "to": "MaxPool_2"}, {"arrows": "to", "from": "MaxPool_2", "title": "neg_eroded", "to": "Neg_3"}, {"arrows": "to", "from": "Neg_3", "title": "output", "to": "output"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"layout": {"hierarchical": {"enabled": true, "direction": "UD", "sortMethod": "directed", "nodeSpacing": 120, "levelSeparation": 60}}, "physics": {"enabled": false}, "edges": {"arrows": {"to": {"enabled": true}}, "color": {"color": "#e2e8f0", "highlight": "#c7d2fe"}, "smooth": {"type": "cubicBezier"}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
